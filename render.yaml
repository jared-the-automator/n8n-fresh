services:
  - type: web
    name: n8n
    env: docker
    buildCommand: docker build -t n8n-tesseract .
    startCommand: docker run -p 3000:3000 n8n-tesseract
    envVars:
      - key: NODE_VERSION
        value: 18.19.1
      - key: N8N_HOST
        value: n8n-fresh.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: 3000
      - key: PORT
        value: 3000
